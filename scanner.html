<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>АВИЦЕННА — живой сканер</title>
<style>
  html, body { margin:0; padding:0; background:#000; height:100%; overflow:hidden; font-family: Arial, sans-serif; }
  #video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; background:#000; }
  #overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:space-between; box-sizing:border-box; }
  #topbar { background:rgba(0,0,0,0.55); color:#fff; padding:16px; text-align:center; font-size:16px; font-weight:bold; }
  #frame { position:absolute; top:50%; left:50%; width:70vw; max-width:320px; height:70vw; max-height:320px; transform:translate(-50%,-50%); border:3px solid rgba(255,255,255,0.85); border-radius:16px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.35); transition: border-color .15s; pointer-events:none; }
  #frame.hit { border-color:#4CAF50; }
  #bottombar { padding:20px; text-align:center; }
  #toast { background:rgba(76,175,80,0.95); color:#fff; font-weight:bold; padding:10px 16px; border-radius:8px; display:inline-block; margin-bottom:12px; font-size:15px; min-height:20px; opacity:0; transition:opacity .2s; }
  #toast.show { opacity:1; }
  #closeBtn { background:#F44336; color:#fff; border:none; padding:14px 26px; font-size:16px; font-weight:bold; border-radius:8px; }
  #errorBox { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:#111; color:#fff; padding:30px; box-sizing:border-box; text-align:center; }
  #errorBox h2 { margin-top: 60px; }
  #errorBox p { color:#ccc; }
</style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div id="overlay">
    <div id="topbar">📷 АВИЦЕННА — наведите камеру на QR-бейдж</div>
    <div id="frame"></div>
    <div id="bottombar">
      <div id="toast"></div><br>
      <button id="closeBtn" onclick="window.close()">✖ Закрыть сканер</button>
    </div>
  </div>
  <div id="errorBox">
    <h2>❌ Камера недоступна</h2>
    <p id="errorText"></p>
    <p style="font-size:14px;">Откройте эту ссылку в обычном браузере (Safari на iPhone, Chrome на Android) — не через Telegram или другое приложение со встроенным браузером — и разрешите доступ к камере.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>
    // =========================================================================
    // ОБЯЗАТЕЛЬНО: вставьте сюда адрес вашего Apps Script веб-приложения
    // (Deploy → Manage deployments → Web app → скопировать ссылку, она заканчивается на /exec)
    // =========================================================================
    var APPS_SCRIPT_URL = "ВСТАВЬТЕ_ССЫЛКУ_НА_ВАШ_APPS_SCRIPT_/exec";

    var params = new URLSearchParams(window.location.search);
    var session = params.get('session') || ('s' + Date.now());

    var video = document.getElementById('video');
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d', { willReadFrequently: true });
    var frameEl = document.getElementById('frame');
    var toastEl = document.getElementById('toast');

    var lastCode = "";
    var lastTime = 0;

    function showToast(text) {
      toastEl.textContent = text;
      toastEl.classList.add('show');
      frameEl.classList.add('hit');
      if (navigator.vibrate) { try { navigator.vibrate(120); } catch (e) {} }
      beep();
      setTimeout(function () { frameEl.classList.remove('hit'); }, 300);
      setTimeout(function () { toastEl.classList.remove('show'); }, 1800);
    }

    var audioCtx = null;
    function beep() {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.12);
      } catch (e) { /* звук не критичен, игнорируем */ }
    }

    function sendScan(code) {
      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf("ВСТАВЬТЕ") !== -1) {
        alert("⚠️ Не настроен APPS_SCRIPT_URL внутри scanner.html — сканы никуда не отправляются.");
        return;
      }
      var url = APPS_SCRIPT_URL + '?action=submitScan&session=' + encodeURIComponent(session) + '&code=' + encodeURIComponent(code);
      // GET + no-cors: Apps Script не умеет отвечать с правильными CORS-заголовками,
      // поэтому мы не читаем ответ, а просто "стреляем и забываем" — данные всё равно долетают.
      fetch(url, { mode: 'no-cors' }).catch(function () { /* сеть моргнула — сработает на следующем скане */ });
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
        if (code && code.data) {
          var now = Date.now();
          if (code.data !== lastCode || (now - lastTime) > 4000) { // защита от повторной отправки одного и того же кода подряд
            lastCode = code.data; lastTime = now;
            sendScan(code.data);
            showToast("✅ Отправлено: " + code.data);
          }
        }
      }
      requestAnimationFrame(tick);
    }

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(function (stream) {
          video.srcObject = stream;
          video.setAttribute('playsinline', true);
          video.play();
          requestAnimationFrame(tick);
        })
        .catch(function (err) {
          document.getElementById('errorBox').style.display = 'block';
          document.getElementById('errorText').textContent = (err && err.message) ? err.message : String(err);
        });
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('errorText').textContent = "Этот браузер не поддерживает доступ к камере со страницы.";
    } else if (!window.isSecureContext) {
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('errorText').textContent = "Страница должна открываться по https:// — камера работает только в защищённом контексте.";
    } else {
      startCamera();
    }
  </script>
</body>
</html>
